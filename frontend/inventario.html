<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario ERP</title>
    <link rel="stylesheet" href="styles.css">
</head>

<script>

function agregarProducto(event){

    event.preventDefault();

    const tabla = document.getElementById("tabla-productos");

    const fila = tabla.insertRow();

    fila.innerHTML = `
        <td>Nuevo Producto</td>
        <td>10</td>
        <td>Santiago</td>
    `;
}

</script>

<body>

<header>
    ERP Seguridad LTDA
</header>

<div class="container">

    <div class="sidebar">

        <h2>ERP</h2>

        <ul>
            <li><a href="empleados.html">Empleados</a></li>
            <li><a href="inventario.html">Inventario</a></li>
            <li><a href="login.html">Cerrar Sesión</a></li>
        </ul>

    </div>

    <div class="content">

        <div class="stats">

            <div class="stat-card">
                <h3>Productos</h3>
                <p>56</p>
            </div>

            <div class="stat-card">
                <h3>Stock Bajo</h3>
                <p>4</p>
            </div>

            <div class="stat-card">
                <h3>Bodegas</h3>
                <p>3</p>
            </div>

        </div>

        <div class="card">

            <h2>Registrar Producto</h2>

            <form onsubmit="agregarProducto(event)">

                <input type="text" placeholder="Nombre producto">

                <input type="number" placeholder="Stock disponible">

                <input type="text" placeholder="Bodega">

                <button type="submit">Registrar Producto</button>

            </form>

        </div>

        <div class="card">

            <h2>Inventario Disponible</h2>

            <table class="table" id="tabla-productos">

                <tr>
                    <th>Producto</th>
                    <th>Stock</th>
                    <th>Bodega</th>
                </tr>

                <tr>
                    <td>Notebook Dell</td>
                    <td>12</td>
                    <td>Santiago</td>
                </tr>

                <tr>
                    <td>Monitor Samsung</td>
                    <td>7</td>
                    <td>Concepción</td>
                </tr>

                <tr>
                    <td>Mouse Logitech</td>
                    <td>25</td>
                    <td>Los Ángeles</td>
                </tr>

            </table>

        </div>

    </div>

</div>

</body>
</html>
